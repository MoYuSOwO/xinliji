<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新周礼记</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#readerPanel">跳至正文</a>
    <div class="site-shell">
      <header class="masthead" aria-label="新周礼记">
        <div class="seal" aria-hidden="true">礼</div>
        <div class="masthead-copy">
          <p class="kicker">今事古书 · 旧辞新梗</p>
          <h1>新周礼记</h1>
          <p class="lede">以古人之笔，录今日之怪与趣。</p>
        </div>
        <dl class="collection-stats" aria-label="册子统计">
          <div>
            <dt>篇</dt>
            <dd id="totalCount">-</dd>
          </div>
          <div>
            <dt>卷</dt>
            <dd id="volumeCount">-</dd>
          </div>
        </dl>
      </header>

      <main id="mainContent" class="layout">
        <aside class="library" aria-labelledby="libraryTitle">
          <div class="library-head">
            <div>
              <p class="eyebrow">目录</p>
              <h2 id="libraryTitle">诸篇</h2>
            </div>
            <p id="resultCount" class="result-count">载入中</p>
          </div>

          <div class="toolbar">
            <label class="filter-field" for="volumeFilter">
              <span class="field-label">按卷筛选</span>
              <select id="volumeFilter" class="volume-filter">
                <option value="">全部卷目</option>
              </select>
            </label>
            <label class="search-field" for="searchInput">
              <span class="field-label">检索篇目</span>
              <span class="search-control">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
                </svg>
                <input id="searchInput" type="search" placeholder="篇名、作者、卷名" autocomplete="off" />
              </span>
            </label>
          </div>
          <div id="articleList" class="article-list"></div>
        </aside>

        <article id="readerPanel" class="reader" tabindex="-1">
          <div class="reader-inner">
            <div class="reader-top">
              <div>
                <p id="articleVolume" class="volume"></p>
                <p id="readerCount" class="reader-count" aria-live="polite"></p>
              </div>
            </div>
            <h2 id="articleTitle" aria-live="polite"></h2>
            <div id="articleMeta" class="meta-line"></div>
            <div class="reader-actions" aria-label="篇目翻阅">
              <button id="prevArticle" class="text-button" type="button">上一篇</button>
              <button id="randomArticle" class="text-button text-button-primary" type="button">随便翻</button>
              <button id="nextArticle" class="text-button" type="button">下一篇</button>
            </div>
            <div id="articleBody" class="article-body"></div>
          </div>
        </article>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
